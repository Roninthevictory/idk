<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The New Era - Discord Banner Box</title>
    <!-- Using a more stable CDN for GIF.js -->
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@700&display=swap');

        :root {
            --neon-purple: #c026d3;
            --neon-glow: #a855f7;
            --bg-deep: #0c061d;
            --white-bright: #ffffff;
            --success-green: #22c55e;
            --error-red: #ef4444;
            --banner-width: 960px;
            --banner-height: 540px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            font-family: 'Merriweather', serif;
        }

        .banner-box {
            position: relative;
            width: var(--banner-width);
            height: var(--banner-height);
            background-color: var(--bg-deep);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(min(1, calc(90vw / 960)));
        }

        .enchanted-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0524 0%, #1a0b3c 25%, #3b0764 50%, #1a0b3c 75%, #0f0524 100%);
            background-size: 400% 400%;
            animation: enchantedMove 8s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes enchantedMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #main-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 25;
            pointer-events: none;
        }

        canvas#sparkle-canvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .controls-area {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding-bottom: 50px;
        }

        .btn-export {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-glow));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-export:disabled {
            background: #444;
            cursor: not-allowed;
            box-shadow: none;
        }

        .progress-container {
            width: 200px;
            height: 10px;
            background: #222;
            border-radius: 5px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--success-green);
        }

        .loop-controls {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 30px;
        }

        .indicator-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .loop-flash {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            position: relative;
        }

        .loop-flash-inner {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
        }

        .flash-green { background: var(--success-green); box-shadow: 0 0 12px var(--success-green); }
        .flash-red { background: var(--error-red); box-shadow: 0 0 12px var(--error-red); }

        .active-flash {
            animation: flashAnim 1s ease-out forwards;
        }

        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="banner-box" id="banner">
        <div class="enchanted-bg"></div>
        <canvas id="sparkle-canvas"></canvas>
        <canvas id="main-canvas"></canvas>
    </div>

    <div class="controls-area">
        <div class="loop-controls">
            <div class="indicator-group">
                <div class="loop-flash"><div id="flash-start" class="loop-flash-inner flash-green"></div></div>
                <div class="loop-text" style="color:#aaa; font-size:10px; text-transform:uppercase;">Start</div>
            </div>
            <div class="indicator-group">
                <div class="loop-flash"><div id="flash-end" class="loop-flash-inner flash-red"></div></div>
                <div class="loop-text" style="color:#aaa; font-size:10px; text-transform:uppercase;">End</div>
            </div>
        </div>

        <button id="export-btn" class="btn-export">Record Taller Diamond GIF</button>
        <div id="progress-container" class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <canvas id="capture-canvas" width="400" height="400" style="display:none;"></canvas>

    <script>
        const sparkleCanvas = document.getElementById('sparkle-canvas');
        const mainCanvas = document.getElementById('main-canvas');
        const captureCanvas = document.getElementById('capture-canvas');
        const flashStart = document.getElementById('flash-start');
        const flashEnd = document.getElementById('flash-end');
        const exportBtn = document.getElementById('export-btn');
        const progContainer = document.getElementById('progress-container');
        const progBar = document.getElementById('progress-bar');
        
        const sCtx = sparkleCanvas.getContext('2d');
        const mCtx = mainCanvas.getContext('2d');
        const cCtx = captureCanvas.getContext('2d');
        
        const WIDTH = 960;
        const HEIGHT = 540;
        
        const BASE_WIDTH = 260;
        const BASE_HEIGHT = 320;

        sparkleCanvas.width = mainCanvas.width = WIDTH;
        sparkleCanvas.height = mainCanvas.height = HEIGHT;

        let isLogoLoaded = false;
        let workerBlobUrl = null;
        
        const logoImg = new Image();
        // Since Discord links often fail with CORS in canvas, we use a fallback if needed or ensure the URL is clean.
        // For reliability in this environment, I'm switching to the local filename reference we had earlier which is more stable.
        logoImg.src = "https://cdn.discordapp.com/attachments/1472369421296074970/1477423481246454014/tnelogonobg.png?ex=69a4b557&is=69a363d7&hm=e27e2e37ab96e8b741c952d9b0e65ab6959062d822be9a199b8d0b37a41b58b5&";

        async function init() {
            logoImg.onload = () => { isLogoLoaded = true; };
            logoImg.onerror = () => { 
                console.warn("Logo failed to load from primary source. Attempting fallback...");
                // Final fallback to a generic placeholder if everything fails
                logoImg.src = "https://cdn.discordapp.com/attachments/1472369421296074970/1477423481246454014/tnelogonobg.png";
            };

            try {
                const workerResponse = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
                const workerCode = await workerResponse.text();
                workerBlobUrl = URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' }));
            } catch (e) { 
                console.error("Worker fetch failed");
            }
        }
        init();

        const perimeter = (WIDTH * 2) + (HEIGHT * 2);
        function getPointOnPerimeter(dist) {
            dist = ((dist % perimeter) + perimeter) % perimeter;
            if (dist < WIDTH) return { x: dist, y: 0 };
            if (dist < WIDTH + HEIGHT) return { x: WIDTH, y: dist - WIDTH };
            if (dist < WIDTH * 2 + HEIGHT) return { x: WIDTH - (dist - (WIDTH + HEIGHT)), y: HEIGHT };
            return { x: 0, y: HEIGHT - (dist - (WIDTH * 2 + HEIGHT)) };
        }

        let frameCount = 0;
        const ANIMATION_FRAMES = 120;
        const DELAY_FRAMES = 60;
        const TOTAL_CYCLE = ANIMATION_FRAMES + DELAY_FRAMES;

        function drawTallerDiamondPath(ctx, w, h) {
            const hw = w / 2;
            const hh = h / 2;
            ctx.beginPath();
            ctx.moveTo(0, -hh); 
            ctx.lineTo(hw, 0);  
            ctx.lineTo(0, hh);  
            ctx.lineTo(-hw, 0); 
            ctx.closePath();
        }

        function drawFullDiamond(ctx, x, y, w, h, progress) {
            ctx.save();
            ctx.translate(x, y);

            ctx.save();
            drawTallerDiamondPath(ctx, w, h);
            ctx.fillStyle = "#0c061d";
            ctx.shadowBlur = 40;
            ctx.shadowColor = "rgba(168, 85, 247, 0.4)";
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.15)";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();

            if (isLogoLoaded) {
                const pulse = 1 + (progress > 0 ? Math.sin(progress * Math.PI * 2) * 0.04 : 0);
                const s = 190 * pulse;
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = "#c026d3";
                try {
                    ctx.drawImage(logoImg, -s/2, -s/2, s, s);
                } catch(e) {
                    // Fail silently on draw if CORS still bites
                }
                ctx.restore();
            }

            if (progress > 0) {
                ctx.save();
                const grad = ctx.createConicGradient(progress * Math.PI * 2, 0, 0);
                grad.addColorStop(0, "transparent");
                grad.addColorStop(0.1, "white");
                grad.addColorStop(0.2, "rgba(168, 85, 247, 1)");
                grad.addColorStop(0.3, "transparent");
                grad.addColorStop(1, "transparent");

                ctx.lineJoin = "miter";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "rgba(168, 85, 247, 0.8)";
                ctx.strokeStyle = grad;
                ctx.lineWidth = 10;
                drawTallerDiamondPath(ctx, w, h);
                ctx.stroke();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = "white";
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = 0.5;
                drawTallerDiamondPath(ctx, w, h);
                ctx.stroke();
                ctx.restore();
            }

            ctx.restore();
        }

        function drawBannerBorder(ctx, progress) {
            if (progress <= 0) return;
            const lineLength = perimeter * 0.7;
            const headDist = progress * (perimeter + lineLength);
            
            ctx.save();
            ctx.lineCap = "round";
            ctx.beginPath();
            for (let i = 0; i <= 200; i++) {
                const d = headDist - (lineLength * (1 - i/200));
                if (d >= 0 && d <= perimeter) {
                    const p = getPointOnPerimeter(d);
                    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                }
            }
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#a855f7";
            ctx.strokeStyle = "white";
            ctx.lineWidth = 6;
            ctx.stroke();
            ctx.restore();
        }

        const stars = Array.from({ length: 40 }, () => ({
            x: Math.random() * WIDTH,
            y: Math.random() * HEIGHT,
            s: Math.random() * 2,
            v: Math.random() * 0.5 + 0.1
        }));

        function animate() {
            frameCount = (frameCount + 1) % TOTAL_CYCLE;
            sCtx.clearRect(0, 0, WIDTH, HEIGHT);
            mCtx.clearRect(0, 0, WIDTH, HEIGHT);

            const progress = frameCount >= DELAY_FRAMES ? (frameCount - DELAY_FRAMES) / ANIMATION_FRAMES : 0;

            if (frameCount === DELAY_FRAMES) triggerFlash(flashStart);
            if (frameCount === TOTAL_CYCLE - 1) triggerFlash(flashEnd);

            stars.forEach(p => {
                p.y -= p.v; if (p.y < 0) p.y = HEIGHT;
                sCtx.fillStyle = "rgba(255,255,255,0.3)";
                sCtx.fillRect(p.x, p.y, p.s, p.s);
            });

            drawBannerBorder(mCtx, progress);
            drawFullDiamond(mCtx, WIDTH/2, HEIGHT/2, BASE_WIDTH, BASE_HEIGHT, progress);

            requestAnimationFrame(animate);
        }

        function triggerFlash(el) {
            el.classList.remove('active-flash');
            void el.offsetWidth;
            el.classList.add('active-flash');
        }

        exportBtn.onclick = () => {
            if (typeof GIF === 'undefined' || !workerBlobUrl) {
                alert("GIF resources are still loading or blocked. Please refresh or check your connection.");
                return;
            }
            
            exportBtn.disabled = true;
            exportBtn.innerText = "Processing...";
            progContainer.style.display = 'block';
            progBar.style.width = '0%';

            const gif = new GIF({
                workers: 2,
                quality: 10,
                width: 400,
                height: 400,
                workerScript: workerBlobUrl,
                transparent: 'rgba(0,0,0,0)'
            });

            try {
                for (let f = 0; f < TOTAL_CYCLE; f++) {
                    cCtx.clearRect(0, 0, 400, 400);
                    const p = f >= DELAY_FRAMES ? (f - DELAY_FRAMES) / ANIMATION_FRAMES : 0;
                    drawFullDiamond(cCtx, 200, 200, BASE_WIDTH, BASE_HEIGHT, p);
                    gif.addFrame(cCtx, {copy: true, delay: 16});
                }

                gif.on('progress', p => {
                    progBar.style.width = (p * 100) + "%";
                });

                gif.on('finished', blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'nte-diamond-only.gif';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    exportBtn.disabled = false;
                    exportBtn.innerText = "Record Taller Diamond GIF";
                    progContainer.style.display = 'none';
                });

                gif.render();
            } catch (err) {
                console.error("GIF Render Error:", err);
                exportBtn.disabled = false;
                exportBtn.innerText = "Error - Try Again";
                progContainer.style.display = 'none';
            }
        };

        animate();
    </script>
</body>
</html>
